# H2 In-Memory Database Configuration setup to mimic PostgreSQL
spring.datasource.url=jdbc:h2:mem:ledger_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Automatically creates the database schema before tests and drops it right after
spring.jpa.hibernate.ddl-auto=create-drop

# Logging - set to true to see the exact SQL Hibernate generates in your console
spring.jpa.show-sql=true