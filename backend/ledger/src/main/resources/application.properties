spring.application.name=ledger

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gojo_ledger_db
spring.datasource.username=gojo-user
spring.datasource.password=pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' is fine for early dev (Phase 1.1/1.2); switch to a migration tool like Flyway/Liquibase later!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=admin
spring.security.user.password=admin